<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Trixiant</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#06080A;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;}
  .tag{font-family:'Share Tech Mono',monospace;font-size:11px;color:#D81E3C;letter-spacing:5px;margin-bottom:14px;}
  .code{font-family:'Bebas Neue',sans-serif;font-size:clamp(70px,18vw,120px);color:#E0F0FA;letter-spacing:2px;line-height:.9;}
  .msg{font-family:'Bebas Neue',sans-serif;font-size:clamp(22px,5vw,30px);color:#E0F0FA;letter-spacing:1px;margin-top:6px;}
  .desc{font-family:'Share Tech Mono',monospace;font-size:12px;color:#4E7088;letter-spacing:1px;max-width:400px;line-height:1.8;margin-top:18px;}
  .back{margin-top:28px;display:inline-block;border:1px solid #00C8F0;color:#00C8F0;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;padding:12px 24px;text-transform:uppercase;text-decoration:none;transition:background .25s,color .25s;}
  .back:hover{background:#00C8F0;color:#06080A;}
</style>
</head>
<body>
  <div class="tag">// TARGET NOT FOUND</div>
  <div class="code">404</div>
  <div class="msg">FILE DOES NOT EXIST</div>
  <div class="desc">The requested resource could not be located on this server.<br>It may have been moved, renamed, or never existed.</div>
  <a href="/" class="back">Return to base</a>
</body>
</html>
